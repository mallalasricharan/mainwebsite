<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Health Test - LifeCare Hospital</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ===== BODY ===== */
body{
font-family: Arial, sans-serif;
background:#f0f4f8;
color:#333;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

/* ===== HEADING ===== */
h1{
text-align:center;
color:#007bff;
margin-bottom:30px;
font-size:2rem;
}

/* ===== FORM ===== */
form{
width:100%;
max-width:700px;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
}

form label{
margin-top:15px;
font-weight:bold;
font-size:0.95rem;
}

form input,
form textarea{
width:100%;
padding:12px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:1rem;
}

form input:focus,
form textarea:focus{
border-color:#007bff;
outline:none;
}

form textarea{
resize:vertical;
}

/* ===== BUTTON ===== */
form button{
margin-top:25px;
padding:14px;
background:#28a745;
color:#fff;
border:none;
border-radius:6px;
font-size:1.1rem;
cursor:pointer;
}

form button:hover{
background:#1e7e34;
}

</style>
</head>

<body>

<h1>Book Your Health Test</h1>

<form onsubmit="showPopup(event)">

<label for="name">Full Name</label>
<input type="text" id="name" name="name" placeholder="Enter your full name" required>

<label for="email">Email Address</label>
<input type="email" id="email" name="email" placeholder="Enter your email" required>

<label for="phone">Phone Number</label>
<input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

<label for="date">Preferred Date</label>
<input type="date" id="date" name="date" required>

<label for="notes">Additional Notes</label>
<textarea id="notes" name="notes" rows="4" placeholder="Any special instructions or health concerns"></textarea>

<button type="submit">Book Test</button>

</form>

<script>
function showPopup(event){
event.preventDefault();

alert("Your health test has been booked successfully!");

window.location.href="profile.page.html";
}
</script>

</body>
</html>
